# .checkov.yaml
# =====================================================================
# Checkov Suppression Configuration
#
# Documents intentional deviations from Checkov security checks.
# Each suppression must have a justification comment.
#
# Enterprise practice: suppressions are reviewed in PRs the same as
# any other code change. Silent suppressions are not permitted.
#
# Format:
#   skip-check: [CHECK_ID, ...]
#   or per-resource via inline comments: # checkov:skip=CHECK_ID:reason
# =====================================================================

soft-fail-on:
  # MEDIUM and LOW findings log to the report but do not block the deploy.
  # HIGH and CRITICAL findings (not listed here) are hard failures.
  - MEDIUM
  - LOW

skip-check:
  # -------------------------------------------------------
  # CKV_AWS_8 - EC2 instance should not have public IP
  # Justification: DC instances are in private subnets with no
  # public IP (map_public_ip_on_launch = false). Checkov cannot
  # always infer subnet settings from the plan; this is a
  # false positive for instances in private subnets.
  # -------------------------------------------------------
  - CKV_AWS_8

  # -------------------------------------------------------
  # CKV_AWS_24 - Security group should not allow RDP from 0.0.0.0/0
  # Justification: DC security group allows RDP only from the VPC
  # CIDR as a break-glass option. Source is not 0.0.0.0/0.
  # Checkov sometimes misreads CIDR conditions in plan JSON.
  # -------------------------------------------------------
  - CKV_AWS_24

  # -------------------------------------------------------
  # CKV_AWS_25 - Security group should not allow SSH from 0.0.0.0/0
  # Justification: No SSH rules exist in any security group.
  # Included as a precaution against false positives on port
  # ranges that overlap with 22.
  # -------------------------------------------------------
  - CKV_AWS_25

  # -------------------------------------------------------
  # CKV_AWS_260 - Security group should not allow ingress from 0.0.0.0/0 to port 80
  # Justification: No port 80 ingress rules exist. False positive
  # on dynamic RPC range (49152-65535) in DC security group.
  # -------------------------------------------------------
  - CKV_AWS_260

  # -------------------------------------------------------
  # CKV_AWS_111 - IAM policy should not allow * resource with write access
  # Justification: The KMS key policy grants kms:* to the security
  # account root for key administration. This is the documented
  # AWS pattern for CMK key policies and is scoped to the
  # security account principal, not a wildcard principal.
  # -------------------------------------------------------
  - CKV_AWS_111

  # -------------------------------------------------------
  # CKV_AWS_109 - IAM policy should not allow * resource
  # Justification: Same as CKV_AWS_111 -- KMS key policy root grant.
  # -------------------------------------------------------
  - CKV_AWS_109

  # -------------------------------------------------------
  # CKV_AWS_338 - CloudWatch log group retention should be at least 1 year
  # Justification: CloudTrail log group retention is set to 365 days
  # which equals exactly 1 year. Checkov may evaluate this as < 365
  # depending on how it handles the boundary value.
  # -------------------------------------------------------
  - CKV_AWS_338

  # -------------------------------------------------------
  # CKV_AWS_50 - Lambda functions should enable X-Ray tracing
  # Justification: The SIEM detector Lambda is a lightweight
  # scheduled detection runner. X-Ray tracing adds cost without
  # meaningful benefit for this use case. CloudWatch Logs provide
  # sufficient observability for the detection workload.
  # -------------------------------------------------------
  - CKV_AWS_50

  # -------------------------------------------------------
  # CKV_AWS_116 - Lambda function should have a dead letter queue configured
  # Justification: SIEM detector Lambda failures are observable
  # via CloudWatch Alarms on the SIEM/Detections namespace.
  # A DLQ would add complexity without improving detection coverage
  # since the Lambda is scheduled and retries automatically.
  # -------------------------------------------------------
  - CKV_AWS_116

  # -------------------------------------------------------
  # CKV_AWS_272 - Lambda function should use CodeSigning
  # Justification: Lambda code is defined inline in Terraform
  # and deployed via the CI pipeline. Code signing is appropriate
  # for externally-sourced deployment packages, not inline code
  # managed in a version-controlled IaC repository.
  # -------------------------------------------------------
  - CKV_AWS_272

  # -------------------------------------------------------
  # CKV2_AWS_5 - Security group not attached to any resource
  # Justification: Security groups for VPC endpoints and the DC
  # are attached to resources managed in other Terraform files.
  # Checkov evaluates each file independently and cannot see
  # cross-file attachments in HCL scan mode.
  # Plan-mode scan resolves this; suppress for HCL mode only.
  # -------------------------------------------------------
  - CKV2_AWS_5

  # -------------------------------------------------------
  # CKV_AWS_355 - Ensure no IAM policies documents allow "*" as a statement's resource
  # Justification: KMS key policy requires Resource: "*" per AWS
  # documentation -- KMS key policies cannot reference specific
  # resource ARNs because the key itself is the resource.
  # -------------------------------------------------------
  - CKV_AWS_355

  # -------------------------------------------------------
  # CKV_AWS_345 / CKV_AWS_346 - Network Firewall CMK encryption
  # Justification: Network Firewall rule groups and policy use
  # AWS-managed keys rather than a CMK.
  # Portfolio note: This is an ephemeral dev/demo environment spun
  # up and torn down on demand. The cost and operational overhead of
  # a dedicated CMK for firewall rule metadata is not proportionate
  # for this use case. In a production environment this would be
  # remediated by adding an encryption_configuration block referencing
  # the org-logs-cmk key. Audit log data IS encrypted with the CMK
  # at the org-logs S3 destination.
  # -------------------------------------------------------
  - CKV_AWS_345
  - CKV_AWS_346

  # -------------------------------------------------------
  # CKV_AWS_331 - Transit Gateway auto-accept shared attachments
  # Justification: auto_accept_shared_attachments = "enable" is
  # intentional for the hub-and-spoke topology. Spoke VPC attachments
  # are shared via RAM from the networking account. Manual acceptance
  # would break automated spoke onboarding. Access control is enforced
  # by RAM share policies and SCPs, not TGW attachment acceptance.
  # Portfolio note: In a production multi-account org this would be
  # paired with a Lambda-based approval workflow that validates the
  # requesting account against an approved account list before
  # allowing the attachment to proceed.
  # -------------------------------------------------------
  - CKV_AWS_331

  # -------------------------------------------------------
  # CKV_AWS_344 - Network Firewall deletion protection
  # Justification: delete_protection is intentionally set to false.
  # Portfolio note: This is an ephemeral environment designed to be
  # fully torn down and redeployed via the cleanup workflow. Deletion
  # protection would block automated cleanup runs. In a production
  # environment this would be set to true and firewall changes would
  # go through a change management process.
  # -------------------------------------------------------
  - CKV_AWS_344

  # -------------------------------------------------------
  # CKV2_AWS_12 - Default VPC security group restricts all traffic
  # Justification: The default security group is never attached to
  # any resource -- all resources use explicitly defined security
  # groups. The default SG is left unmodified.
  # Portfolio note: In a production environment an
  # aws_default_security_group resource with no rules would be added
  # to explicitly lock it down and satisfy this control. Omitted here
  # to keep the resource count minimal for a demo environment.
  # -------------------------------------------------------
  - CKV2_AWS_12

  # -------------------------------------------------------
  # CKV_AWS_117 - Lambda should run inside a VPC
  # Justification: The SIEM detector Lambda calls Athena, S3, Glue,
  # SNS, and CloudWatch -- all public AWS API endpoints. Placing it
  # inside the VPC would require dedicated Interface VPC endpoints for
  # each service, adding cost and operational overhead with no security
  # benefit for this network topology (all traffic stays within the
  # AWS network regardless). CloudWatch Logs provides full observability.
  # -------------------------------------------------------
  - CKV_AWS_117

  # -------------------------------------------------------
  # CKV_AWS_115 - Lambda should have a reserved concurrent execution
  # Justification: The SIEM detector Lambda runs on an hourly
  # EventBridge schedule with a single concurrent invocation. Reserved
  # concurrency would limit burst capacity during threat simulation
  # manual invocations. CloudWatch Alarms on the Lambda error metric
  # provide the equivalent protection against runaway invocations.
  # -------------------------------------------------------
  - CKV_AWS_115

  # -------------------------------------------------------
  # CKV_AWS_252 - EventBridge rule target should have a dead letter queue
  # Justification: The EventBridge target invokes the SIEM Lambda on a
  # schedule. Lambda invocation failures are observable via CloudWatch
  # Alarms on the SIEM/Detections namespace; the Lambda is rescheduled
  # automatically on the next hourly tick. Adding an SQS DLQ here would
  # duplicate the dead letter queue suppression already in place for the
  # Lambda itself (CKV_AWS_116).
  # -------------------------------------------------------
  - CKV_AWS_252

  # -------------------------------------------------------
  # CKV_AWS_18 - S3 bucket should have access logging enabled
  # Justification: Enabling access logging on the org-logs bucket would
  # create a circular reference (access logs for the audit bucket written
  # to itself). A separate logging bucket would be required in production.
  # For the Terraform state bucket, access logs would need a third bucket.
  # Omitted for the ephemeral demo environment.
  # -------------------------------------------------------
  - CKV_AWS_18

  # -------------------------------------------------------
  # CKV_AWS_144 - S3 bucket should have cross-region replication enabled
  # Justification: Cross-region replication adds per-GB storage and
  # transfer cost. This is an ephemeral dev/demo environment; all log
  # data can be redeployed from source. In a production environment
  # replication to a second region would be added for the org-logs
  # bucket to satisfy DR requirements.
  # -------------------------------------------------------
  - CKV_AWS_144

  # -------------------------------------------------------
  # CKV2_AWS_62 - S3 bucket should have event notifications enabled
  # Justification: The org-logs bucket does not require S3 event
  # notifications. Log delivery is push-based (CloudTrail, GuardDuty,
  # Config write directly). SIEM detection is driven by scheduled
  # Athena queries, not S3 object-created events. Adding notifications
  # would require an SNS or SQS target and adds no detection value.
  # -------------------------------------------------------
  - CKV2_AWS_62

  # -------------------------------------------------------
  # CKV_AWS_145 - S3 bucket should use KMS CMK for SSE
  # Justification: The Terraform remote state bucket (bootstrap) uses
  # AES256 (SSE-S3) deliberately. The org-logs KMS CMK is created by the
  # security workspace whose state is stored in this bucket -- using the
  # CMK here would create a chicken-and-egg dependency on first bootstrap.
  # The bucket is protected by versioning, public access block, and a
  # TLS-only bucket policy.
  # -------------------------------------------------------
  - CKV_AWS_145

  # -------------------------------------------------------
  # CKV2_AWS_61 - S3 bucket should have a lifecycle configuration
  # Justification: The Terraform state bucket (bootstrap) does not have
  # a lifecycle configuration. State objects are small and accessed
  # infrequently; indefinite retention is intentional to prevent
  # accidental loss of Terraform lock or state files.
  # -------------------------------------------------------
  - CKV2_AWS_61

  # -------------------------------------------------------
  # CKV_AWS_382 - Security group should not allow egress 0.0.0.0/0 on all ports
  # Justification: The corporate DC security group requires unrestricted egress
  # so the domain controller can reach Windows Update, SSM endpoints, and the
  # on-premises DC for AD replication. Restricting egress would break DC
  # promotion and ongoing replication. Ingress is tightly scoped to AD ports
  # from RFC1918 ranges only.
  # -------------------------------------------------------
  - CKV_AWS_382

  # -------------------------------------------------------
  # CKV_AWS_274 - IAM should not use AdministratorAccess managed policy
  # Justification: The PlatformAdmin IAM Identity Center permission set is
  # intentionally granted AdministratorAccess. This role is assigned only to
  # the platform team for break-glass and bootstrapping operations. Access is
  # gated by AD group membership in Cloud-PlatformAdmin, which requires MFA
  # via the AD Connector / Identity Center authentication path.
  # -------------------------------------------------------
  - CKV_AWS_274

  # -------------------------------------------------------
  # CKV_AWS_290 / CKV_AWS_288 / CKV_AWS_289 - IAM policy write/exfiltration/
  # permissions management without constraints
  # Justification: IAM Identity Center permission set inline policies grant
  # broad service access by design for their respective roles (SecurityEngineer,
  # DevOps, Developer, NetworkAdmin, SystemAdmin, DataScientist). These are
  # federated, time-limited SSO sessions scoped to specific AD group assignments
  # -- not long-lived IAM principals. Wildcard actions on security services
  # (guardduty:*, securityhub:*) and operational services (route53:*, s3:*)
  # are intentional for the job functions these roles serve.
  # -------------------------------------------------------
  - CKV_AWS_290
  - CKV_AWS_288
  - CKV_AWS_289

  # -------------------------------------------------------
  # CKV_AWS_121 - AWS Config should be enabled in all regions
  # Justification: This is a deliberate single-region (us-west-1) deployment.
  # The Config aggregator is scoped to us-west-1 because no workloads exist
  # in other regions and SCPs restrict resource creation outside us-west-1.
  # Enabling Config in unused regions would generate cost with no detection value.
  # -------------------------------------------------------
  - CKV_AWS_121

  # -------------------------------------------------------
  # CKV2_AWS_11 - VPC flow logging should be enabled in all VPCs
  # Justification: The management identity VPC is a single-purpose stub VPC
  # whose only function is hosting the AD Connector ENIs. It has no IGW, no NAT,
  # no workload traffic, and no route to the internet. Flow logging here would
  # capture only AD Connector keepalive traffic to the corporate DC; the same
  # traffic is already logged by flow logs on the corporate VPC.
  # -------------------------------------------------------
  - CKV2_AWS_11

  # -------------------------------------------------------
  # CKV2_AWS_28 - ALB should be protected by WAF
  # Justification: WAF adds per-request cost and requires manual rule tuning.
  # This is an ephemeral portfolio demo environment. In a production deployment
  # a WAF WebACL with managed rule groups (AWSManagedRulesCommonRuleSet) would
  # be attached to the ALB. Network Firewall provides layer-4 inspection for
  # outbound/east-west traffic; WAF would add layer-7 inspection for inbound.
  # -------------------------------------------------------
  - CKV2_AWS_28

  # -------------------------------------------------------
  # CKV_AWS_91 - ALB should have access logging enabled
  # Justification: ALB access logs require a dedicated S3 bucket with the
  # Elastic Load Balancing service principal in its policy. The org-logs bucket
  # uses delivery.logs.amazonaws.com for VPC Flow Logs and Network Firewall;
  # ALB access logs use a separate elb.amazonaws.com principal. Adding a
  # separate bucket for ALB logs is out of scope for this ephemeral demo.
  # -------------------------------------------------------
  - CKV_AWS_91

  # -------------------------------------------------------
  # CKV_AWS_150 - ALB should have deletion protection enabled
  # Justification: Deletion protection is intentionally disabled. This is an
  # ephemeral environment that is fully torn down via the cleanup workflow.
  # -------------------------------------------------------
  - CKV_AWS_150

  # -------------------------------------------------------
  # CKV2_AWS_20 - ALB should redirect HTTP to HTTPS
  # Justification: No ACM certificate is provisioned for this demo environment;
  # HTTPS would require a registered domain and certificate. HTTP is acceptable
  # for a portfolio demo. In a production deployment, HTTPS with a managed
  # certificate and HTTP-to-HTTPS redirect would be required.
  # -------------------------------------------------------
  - CKV2_AWS_20

  # -------------------------------------------------------
  # CKV_AWS_2 / CKV_AWS_103 / CKV_AWS_378 - HTTPS / TLS 1.2 / HTTP target group
  # Justification: The internet-facing ALB in the networking egress VPC serves
  # HTTP only. No ACM certificate is provisioned for this ephemeral demo
  # environment (it would require a registered domain). In a production
  # deployment an ACM certificate, HTTPS listener, and HTTP-to-HTTPS redirect
  # would replace the current HTTP listener. CKV2_AWS_20 (redirect HTTP → HTTPS)
  # is already suppressed for the same reason.
  # -------------------------------------------------------
  - CKV_AWS_2
  - CKV_AWS_103
  - CKV_AWS_378

  # -------------------------------------------------------
  # CKV_AWS_139 - RDS deletion protection should be enabled
  # Justification: deletion_protection = false is intentional for the Aurora
  # cluster. This is an ephemeral environment torn down via the cleanup
  # workflow. Deletion protection would require a manual override on every
  # cleanup run. In a production environment this would be set to true.
  # -------------------------------------------------------
  - CKV_AWS_139

  # -------------------------------------------------------
  # CKV_AWS_327 - RDS cluster should be encrypted with a CMK
  # Justification: The web account does not provision a KMS CMK.
  # Aurora is encrypted (storage_encrypted = true) using the default
  # AWS-managed RDS key. Adding a CMK would require cross-account key
  # sharing with the security account and is out of scope for this
  # ephemeral demo. In a production environment the org-logs CMK or a
  # dedicated web-account CMK would be referenced here.
  # -------------------------------------------------------
  - CKV_AWS_327

  # -------------------------------------------------------
  # CKV_AWS_326 - RDS cluster should have backtracking enabled
  # Justification: Aurora Serverless v2 (engine_mode = "provisioned" with
  # serverlessv2_scaling_configuration) does not support backtracking.
  # This is an AWS service limitation, not a configuration choice.
  # -------------------------------------------------------
  - CKV_AWS_326

  # -------------------------------------------------------
  # CKV2_AWS_8 - RDS cluster should have a Backup Plan
  # Justification: AWS Backup plan is not configured for this ephemeral
  # demo environment. Aurora's built-in automated backups (managed by
  # aws_rds_cluster backup_retention_period) are sufficient for the
  # demo. In a production environment an AWS Backup plan with a vault
  # and retention policy would be added.
  # -------------------------------------------------------
  - CKV2_AWS_8

  # -------------------------------------------------------
  # CKV_AWS_118 - RDS instance should have enhanced monitoring enabled
  # Justification: Enhanced monitoring requires an IAM role
  # (AmazonRDSEnhancedMonitoringRole) and adds per-second metric cost.
  # The Aurora Serverless v2 instance in this ephemeral demo is
  # observable via CloudWatch standard metrics. Adding enhanced
  # monitoring is out of scope for a single db.serverless instance.
  # -------------------------------------------------------
  - CKV_AWS_118

  # -------------------------------------------------------
  # CKV_AWS_353 - RDS instance should have Performance Insights enabled
  # Justification: Performance Insights adds per-vCPU cost (free tier
  # is 7 days; long-term retention is paid). For a db.serverless Aurora
  # instance in an ephemeral demo environment the cost is not justified.
  # In a production environment Performance Insights with a CMK-encrypted
  # retention period would be enabled.
  # -------------------------------------------------------
  - CKV_AWS_353

  # -------------------------------------------------------
  # CKV_AWS_135 - EC2 instance should be EBS-optimized
  # Justification: t2.micro does not support EBS optimization — it is
  # not a supported instance type for the ebs_optimized attribute.
  # The web servers use t2.micro (free-tier eligible) for this demo;
  # upgrading to a supported type (t3.micro+) solely for EBS optimization
  # is not proportionate. All EBS volumes are gp3 and encrypted.
  # -------------------------------------------------------
  - CKV_AWS_135

  # -------------------------------------------------------
  # CKV_AWS_126 - EC2 instance should have detailed monitoring enabled
  # Justification: Detailed monitoring (1-minute CloudWatch metrics)
  # adds per-metric cost. The web servers are a demo workload observed
  # via SSM Session Manager; 5-minute basic monitoring is sufficient.
  # In a production environment detailed monitoring would be enabled for
  # application performance visibility.
  # -------------------------------------------------------
  - CKV_AWS_126

  # -------------------------------------------------------
  # CKV_AWS_123 - VPC endpoint service should require acceptance
  # Justification: acceptance_required = false is safe because
  # allowed_principals restricts the endpoint service to only the
  # networking account root principal. Any connection attempt from
  # outside that account is denied by the principal whitelist.
  # Requiring manual acceptance would block the automated phase 3
  # apply that wires up the networking account's consumer endpoint.
  # -------------------------------------------------------
  - CKV_AWS_123

  # -------------------------------------------------------
  # CKV2_AWS_3 - GuardDuty detector must have an associated organization configuration
  # Justification: aws_guardduty_detector.management in security_delegations.tf
  # is a prerequisite resource only -- it enables GuardDuty in the management
  # account so that aws_guardduty_organization_admin_account can designate the
  # security account as org admin. The actual org-wide configuration
  # (aws_guardduty_organization_configuration) is applied by the security account
  # as delegated administrator and lives in terraform/security/security_services.tf.
  # CKV2_AWS_3 cannot detect cross-module/cross-account relationships; this is
  # an architectural false positive.
  # -------------------------------------------------------
  - CKV2_AWS_3
